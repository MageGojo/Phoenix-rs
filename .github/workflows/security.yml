name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_DENY_VERSION: 0.20.2
  RUST_TOOLCHAIN: 1.95.0

jobs:
  secrets:
    name: Secret history scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_SUMMARY: "true"

  supply-chain:
    name: Dependency and license policy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Rust toolchain
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup default "$RUST_TOOLCHAIN"
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version "$CARGO_DENY_VERSION"
      - name: Check Rust advisories, licenses, bans, and sources
        run: |
          cargo deny check advisories licenses bans sources
          cargo deny --manifest-path benchmarks/Cargo.toml --config deny.toml check advisories licenses bans sources
          cargo deny --manifest-path fuzz/Cargo.toml --config deny.toml check advisories licenses bans sources
      - name: Install exact Node dependencies
        run: npm ci
      - name: Check Node advisories
        run: npm audit --audit-level=high
