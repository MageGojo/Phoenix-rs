name: Coverage

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_LLVM_COV_VERSION: 0.8.7
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: 1.95.0

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Rust coverage toolchain
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component llvm-tools-preview
          rustup default "$RUST_TOOLCHAIN"
          cargo install cargo-llvm-cov --locked --version "$CARGO_LLVM_COV_VERSION"
      - name: Generate Rust LCOV
        run: |
          mkdir -p coverage/rust
          cargo llvm-cov --workspace --locked --all-features --fail-under-lines 85 --lcov --output-path coverage/rust/lcov.info
      - name: Install exact Node dependencies
        run: npm ci
      - name: Generate JavaScript LCOV
        run: npm run test:coverage:js
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: coverage/
          if-no-files-found: error
          retention-days: 14
