[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
# Toasty 0.8 still pulls rustls-pemfile. Remove this exception as soon as
# Toasty migrates to rustls-pki-types and the direct Phoenix use is gone.
ignore = ["RUSTSEC-2025-0134"]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "NCSA",
    "Unicode-3.0",
    "Zlib",
]
exceptions = []

[bans]
multiple-versions = "warn"
# Workspace path dependencies are intentionally unpublished during preview.
wildcards = "warn"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
